name: Snyk

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1" # Weekly Monday 4am UTC
  workflow_dispatch:

permissions: {}

jobs:
  snyk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Snyk monitor
        uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: --org=tang-edge-worker --project-name=tang-edge

      - name: Run Snyk test
        id: snyk_test
        uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --org=tang-edge-worker --project-name=tang-edge --json-file-output=snyk-result.json
        continue-on-error: true

      - name: Generate badge data
        run: |
          if [ "${{ steps.snyk_test.outcome }}" = "success" ]; then
            COLOR="brightgreen"
            MESSAGE="0 vulnerabilities"
          elif [ -f snyk-result.json ]; then
            COUNT=$(jq '.uniqueCount // 0' snyk-result.json 2>/dev/null || echo "0")
            if [ "$COUNT" = "0" ]; then
              COLOR="brightgreen"
              MESSAGE="0 vulnerabilities"
            else
              COLOR="red"
              MESSAGE="${COUNT} vulnerabilities"
            fi
          else
            COLOR="yellow"
            MESSAGE="check results"
          fi

          printf '{"schemaVersion":1,"label":"Snyk","message":"%s","color":"%s"}\n' \
            "$MESSAGE" "$COLOR" > /tmp/snyk-badge.json

      - name: Push badge to badges branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /tmp
          git init badges-repo
          cd badges-repo
          git checkout --orphan snyk-badge
          cp /tmp/snyk-badge.json snyk-badge.json
          git add snyk-badge.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "update snyk badge"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/tang-edge/tang-edge.git"
          git push -f origin snyk-badge
